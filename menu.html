<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu | Kukucha Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
color:white;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("images (3).jpg") no-repeat center center/cover;
min-height:100vh;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-family:'Playfair Display',serif;
font-size:1.6rem;
color:#ffd700;
font-weight:800;
}

.nav-menu{
display:flex;
gap:22px;
list-style:none;
}

.nav-menu a{
color:white;
text-decoration:none;
font-weight:500;
}

.nav-menu a:hover{color:#ffd700;}

.menu-toggle{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
}

.menu-toggle span{
width:26px;
height:3px;
background:white;
border-radius:3px;
}

/* MENU SECTION */

.menu-section{
padding:120px 20px 60px;
text-align:center;
}

.menu-section h1{
font-family:'Playfair Display',serif;
font-size:2.8rem;
margin-bottom:40px;
}

.menu-section h1 span{color:#ffd700;}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1000px;
margin:auto;
}

.menu-card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
}

.menu-card h3{
color:#ffd700;
margin-bottom:10px;
}

.menu-card p{
font-size:0.95rem;
color:#ddd;
margin-bottom:8px;
}

.menu-card span{
font-weight:600;
}

/* MOBILE */

@media(max-width:768px){

.menu-toggle{display:flex;}

.nav-menu{
position:fixed;
top:0;
right:-100%;
width:75%;
max-width:280px;
height:100vh;
background:rgba(10,10,10,0.97);
flex-direction:column;
justify-content:center;
gap:28px;
transition:0.35s;
}

.nav-menu.active{right:0;}

.menu-section h1{font-size:2rem;}

}

</style>
</head>

<body>

<header>
<div class="logo">KUKUCHA</div>

<div class="menu-toggle" id="menuToggle">
<span></span>
<span></span>
<span></span>
</div>

<ul class="nav-menu" id="navMenu">
<li><a href="index.html">Home</a></li>
<li><a href="about_us.html">About</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="loction.html">Location</a></li>
</ul>
</header>

<section class="menu-section">

<h1>Our <span>Menu</span></h1>

<div class="menu-grid">

<div class="menu-card">
<h3>Grilled Chicken</h3>
<p>Juicy grilled chicken with special spices.</p>
<span>Rs. 2500</span>
</div>

<div class="menu-card">
<h3>Seafood Fried Rice</h3>
<p>Fresh seafood mixed with aromatic rice.</p>
<span>Rs. 3000</span>
</div>

<div class="menu-card">
<h3>Chocolate Dessert</h3>
<p>Rich chocolate cake with creamy topping.</p>
<span>Rs. 1500</span>
</div>

</div>

</section>

<script>

const menuToggle = document.getElementById('menuToggle');
const navMenu = document.getElementById('navMenu');

menuToggle.addEventListener('click', () => {
menuToggle.classList.toggle('active');
navMenu.classList.toggle('active');
});

document.querySelectorAll('.nav-menu a').forEach(link => {
link.addEventListener('click', () => {
menuToggle.classList.remove('active');
navMenu.classList.remove('active');
});
});

</script>

</body>
</html>
