<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Kukucha Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.85)),
               url("images (3).jpg") no-repeat center center/cover;
    color:white;
}

/* NAVBAR */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    position:fixed;
    width:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#ffd700;
}

nav ul{
    list-style:none;
    display:flex;
    gap:30px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-weight:500;
    position:relative;
}

nav ul li a::after{
    content:'';
    position:absolute;
    width:0%;
    height:2px;
    bottom:-5px;
    left:0;
    background:#ffd700;
    transition:0.3s;
}

nav ul li a:hover::after{
    width:100%;
}

nav ul li a:hover{
    color:#ffd700;
}

/* HERO */

.hero{
    padding:150px 20px 60px;
    text-align:center;
}

.hero h1{
    font-size:50px;
    color:#ffd700;
}

.hero p{
    margin-top:10px;
    color:#ccc;
}

/* CONTACT SECTION */

.contact-container{
    display:flex;
    justify-content:center;
    gap:60px;
    padding:60px 10%;
    flex-wrap:wrap;
}

.contact-info{
    flex:1;
    min-width:280px;
}

.info-card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.info-card h3{
    color:#ffd700;
    margin-bottom:8px;
}

.contact-form{
    flex:1;
    min-width:280px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.contact-form h2{
    margin-bottom:20px;
    color:#ffd700;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    outline:none;
    font-family:'Poppins',sans-serif;
}

.contact-form button{
    padding:12px 30px;
    border:none;
    background:#25D366;
    color:white;
    font-weight:600;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
    width:100%;
}

.contact-form button:hover{
    background:#1ebe5d;
    transform:translateY(-5px);
}

/* RESPONSIVE */

@media(max-width:768px){

    nav ul{
        flex-direction:column;
        gap:15px;
    }

    .hero h1{
        font-size:32px;
    }

    .contact-container{
        flex-direction:column;
        gap:30px;
    }
}

</style>
</head>

<body>

<header>
    <div class="logo">KUKUCHA</div>
    <nav>
        <ul>
            <li><a href="main.html">Home</a></li>
            <li><a href="about_us.html">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="location.html">Location</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h1>Contact Us</h1>
    <p>We would love to hear from you</p>
</section>

<section class="contact-container">

    <div class="contact-info">
        <div class="info-card">
            <h3>📍 Address</h3>
            <p>Kukucha Hotel, Ella, Sri Lanka</p>
        </div>

        <div class="info-card">
            <h3>📞 Phone</h3>
            <p><a href="tel:0727610885" style="color:white;text-decoration:none;">0727610885</a></p>
        </div>

        <div class="info-card">
            <h3>📧 Email</h3>
            <p>info@kukucha.com</p>
        </div>
    </div>

    <!-- UPDATED FORM -->
    <div class="contact-form">
        <h2>Send a Message</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <input type="tel" id="phone" placeholder="Your Phone">
            <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send via WhatsApp</button>
        </form>
    </div>

</section>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let message = document.getElementById("message").value;

    let phoneNumber = "94727610885"; 

    let whatsappMessage =
        "Hello Kukucha Hotel,%0A%0A" +
        "Name: " + name + "%0A" +
        "Email: " + email + "%0A" +
        "Phone: " + phone + "%0A" +
        "Message: " + message;

    let url = "https://wa.me/" + phoneNumber + "?text=" + whatsappMessage;

    window.open(url, "_blank");
});
</script>

</body>
</html>
