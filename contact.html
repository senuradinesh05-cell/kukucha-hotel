<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Kukucha Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
color:white;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("images (3).jpg") no-repeat center center/cover;
min-height:100vh;
overflow-x:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-family:'Playfair Display',serif;
font-size:1.6rem;
color:#ffd700;
font-weight:800;
}

.nav-menu{
display:flex;
gap:22px;
list-style:none;
}

.nav-menu a{
color:white;
text-decoration:none;
font-weight:500;
}

.nav-menu a:hover{
color:#ffd700;
}

.menu-toggle{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
}

.menu-toggle span{
width:26px;
height:3px;
background:white;
border-radius:3px;
}

/* CONTACT SECTION */

.contact-section{
padding:120px 20px 60px;
text-align:center;
}

.contact-section h1{
font-family:'Playfair Display',serif;
font-size:2.8rem;
margin-bottom:20px;
}

.contact-section h1 span{
color:#ffd700;
}

.contact-container{
max-width:800px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-top:30px;
}

.contact-box{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
}

.contact-box h3{
color:#ffd700;
margin-bottom:15px;
}

.contact-box p{
color:#ddd;
margin-bottom:8px;
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-family:'Poppins',sans-serif;
}

.contact-form button{
width:100%;
padding:12px;
border:none;
border-radius:30px;
background:#25D366;
color:white;
font-weight:600;
cursor:pointer;
}

.contact-form button:hover{
background:#1ebe5d;
}

/* MOBILE */

@media(max-width:768px){

.menu-toggle{
display:flex;
}

.nav-menu{
position:fixed;
top:0;
right:-100%;
width:75%;
max-width:280px;
height:100vh;
background:rgba(10,10,10,0.97);
flex-direction:column;
justify-content:center;
gap:28px;
transition:0.35s;
}

.nav-menu.active{
right:0;
}

.contact-container{
grid-template-columns:1fr;
}

.contact-section h1{
font-size:2rem;
}

}

</style>
</head>

<body>

<header>

<div class="logo">KUKUCHA</div>

<div class="menu-toggle" id="menuToggle">
<span></span>
<span></span>
<span></span>
</div>

<ul class="nav-menu" id="navMenu">
<li><a href="index.html">Home</a></li>
<li><a href="about_us.html">About</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="loction.html">Location</a></li>
</ul>

</header>

<section class="contact-section">

<h1>Contact <span>Us</span></h1>

<div class="contact-container">

<div class="contact-box">
<h3>Our Details</h3>
<p>📍 Kukucha Hotel, Ella, Sri Lanka</p>
<p>📞 0727610885</p>
<p>📧 info@kukucha.com</p>
<p>⏰ Open 24 Hours</p>
</div>

<div class="contact-box">
<h3>Send Message via WhatsApp</h3>

<form class="contact-form" id="contactForm">

<input type="text" id="name" placeholder="Your Name" required>
<input type="tel" id="phone" placeholder="Your Phone" required>
<textarea id="message" rows="4" placeholder="Your Message" required></textarea>

<button type="submit">Send via WhatsApp</button>

</form>

</div>

</div>

</section>

<script>

const menuToggle = document.getElementById('menuToggle');
const navMenu = document.getElementById('navMenu');

menuToggle.addEventListener('click', () => {
menuToggle.classList.toggle('active');
navMenu.classList.toggle('active');
});

document.querySelectorAll('.nav-menu a').forEach(link => {
link.addEventListener('click', () => {
menuToggle.classList.remove('active');
navMenu.classList.remove('active');
});
});

/* WhatsApp form */

document.getElementById("contactForm").addEventListener("submit", function(e){
e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let message=document.getElementById("message").value;

let text=
"Hello Kukucha Hotel,%0A%0A"+
"Name: "+name+"%0A"+
"Phone: "+phone+"%0A"+
"Message: "+message;

window.open("https://wa.me/94727610885?text="+text,"_blank");

});

</script>

</body>
</html>
